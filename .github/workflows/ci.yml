name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q client server

      - name: Run unit tests
        run: |
          python -m pytest -m "not integration" \
            --cov=client/src \
            --cov=server/src \
            --cov-branch \
            --cov-fail-under=0 \
            --cov-report=term-missing \
            --cov-report=json:unit-coverage.json \
            --junitxml=unit-test-results.xml

      - name: Summarize unit-test results
        if: always()
        run: >
          python scripts/ci_test_summary.py
          --category "単体テスト"
          --test-report unit-test-results.xml
          --coverage-report unit-coverage.json
          --output "$GITHUB_STEP_SUMMARY"

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q client server

      - name: Run integration tests
        run: |
          python -m pytest -m integration \
            --cov=client/src \
            --cov=server/src \
            --cov-branch \
            --cov-fail-under=0 \
            --cov-report=term-missing \
            --cov-report=json:integration-coverage.json \
            --junitxml=integration-test-results.xml

      - name: Summarize integration-test results
        if: always()
        run: >
          python scripts/ci_test_summary.py
          --category "統合テスト"
          --test-report integration-test-results.xml
          --coverage-report integration-coverage.json
          --output "$GITHUB_STEP_SUMMARY"

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run all tests with branch coverage
        run: |
          python -m pytest \
            --cov=client/src \
            --cov=server/src \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-3.11
          path: coverage.xml
